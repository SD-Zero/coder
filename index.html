<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyhou.se Layout Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #fff;
            border-right: 1px solid #dee2e6;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            overflow-y: auto;
            padding: 20px;
        }
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        .draggable-item {
            cursor: grab;
            padding: 10px;
            background: #e9ecef;
            border: 1px dashed #ced4da;
            border-radius: 4px;
            margin-bottom: 10px;
            user-select: none;
        }
        .draggable-item:active {
            cursor: grabbing;
        }
        .workspace {
            min-height: 400px;
            background: #fff;
            border: 2px dashed #0d6efd;
            border-radius: 8px;
            padding: 20px;
        }
        .workspace:empty::before {
            content: "Drag items here to start building your layout...";
            color: #6c757d;
            display: block;
            text-align: center;
            line-height: 360px;
        }
        /* Custom spacing to avoid 'gap' entirely */
        .workspace-item {
            margin-bottom: 15px;
            position: relative;
            border: 1px solid transparent;
        }
        .workspace-item:hover {
            border: 1px dashed #dc3545;
        }
        .delete-btn {
            display: none;
            position: absolute;
            top: 2px;
            right: 2px;
            z-index: 10;
        }
        .workspace-item:hover .delete-btn {
            display: block;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="mb-4">Components</h4>
        <p class="text-muted small">Drag elements into the workspace:</p>
        
        <div class="draggable-item" draggable="true" data-type="header">Header/Title</div>
        <div class="draggable-item" draggable="true" data-type="paragraph">Paragraph Text</div>
        <div class="draggable-item" draggable="true" data-type="two-columns">2 Columns (Row)</div>
        <div class="draggable-item" draggable="true" data-type="card">Card Component</div>
        <div class="draggable-item" draggable="true" data-type="badge">Status Badge</div>
    </div>

    <div class="main-content">
        <h2 class="mb-4">Toyhou.se Layout Workspace</h2>
        
        <div id="workspace" class="workspace mb-4"></div>
        
        <div class="text-center mb-4">
            <button id="generate-btn" class="btn btn-primary btn-lg">Generate Code</button>
            <button id="clear-btn" class="btn btn-outline-danger btn-lg ms-2">Clear Workspace</button>
        </div>

        <div class="card d-none" id="output-card">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span>Generated Code (Toyhou.se Compliant)</span>
                <button id="copy-btn" class="btn btn-sm btn-outline-light">Copy Code</button>
            </div>
            <div class="card-body">
                <textarea id="code-output" class="form-control font-monospace" rows="10" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        const workspace = document.getElementById('workspace');
        const generateBtn = document.getElementById('generate-btn');
        const clearBtn = document.getElementById('clear-btn');
        const outputCard = document.getElementById('output-card');
        const codeOutput = document.getElementById('code-output');
        const copyBtn = document.getElementById('copy-btn');

        // Templates for the elements (Strictly Bootstrap utilities, NO 'gap')
        const templates = {
            'header': `
                <div class="workspace-item">
                    <button class="btn btn-danger btn-sm delete-btn" onclick="this.parentElement.remove()">×</button>
                    <h1 class="display-4 text-primary mb-3">Character Name</h1>
                </div>`,
            'paragraph': `
                <div class="workspace-item">
                    <button class="btn btn-danger btn-sm delete-btn" onclick="this.parentElement.remove()">×</button>
                    <p class="text-muted mb-3">Write your character's backstory, personality traits, or important details here. This paragraph uses standard margins for spacing.</p>
                </div>`,
            'two-columns': `
                <div class="workspace-item">
                    <button class="btn btn-danger btn-sm delete-btn" onclick="this.parentElement.remove()">×</button>
                    <div class="row mb-3">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <div class="p-3 bg-light border rounded">Left Column Content</div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-3 bg-light border rounded">Right Column Content</div>
                        </div>
                    </div>
                </div>`,
            'card': `
                <div class="workspace-item">
                    <button class="btn btn-danger btn-sm delete-btn" onclick="this.parentElement.remove()">×</button>
                    <div class="card mb-3">
                        <div class="card-body">
                            <h5 class="card-title">Feature Card</h5>
                            <p class="card-text">Great for listing likes, dislikes, or quick statistics.</p>
                        </div>
                    </div>
                </div>`,
            'badge': `
                <div class="workspace-item">
                    <button class="btn btn-danger btn-sm delete-btn" onclick="this.parentElement.remove()">×</button>
                    <div class="mb-3">
                        <span class="badge bg-success me-1">Active</span>
                        <span class="badge bg-secondary">He/Him</span>
                    </div>
                </div>`
        };

        // Drag and Drop Handlers
        let draggedType = null;

        document.querySelectorAll('.draggable-item').forEach(item => {
            item.addEventListener('dragstart', (e) => {
                draggedType = e.target.getAttribute('data-type');
            });
        });

        workspace.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        workspace.addEventListener('drop', (e) => {
            e.preventDefault();
            if (draggedType && templates[draggedType]) {
                workspace.insertAdjacentHTML('beforeend', templates[draggedType]);
            }
        });

        // Generate clean code for Toyhou.se
        generateBtn.addEventListener('click', () => {
            // Clone the workspace to manipulate without messing up live view
            const clone = workspace.cloneNode(true);
            
            // Remove all builder UI elements (delete buttons and container wrapping structures)
            const deleteButtons = clone.querySelectorAll('.delete-btn');
            deleteButtons.forEach(btn => btn.remove());

            const items = clone.querySelectorAll('.workspace-item');
            let finalHtml = '';

            items.forEach(item => {
                // Strip the workspace-item class and formatting wrapper, leave core HTML
                item.removeAttribute('class');
                finalHtml += item.innerHTML.trim() + '\n';
            });

            if (finalHtml.trim() === '') {
                alert('Your workspace is empty!');
                return;
            }

            // Wrap in a clean main container container
            const completeCode = `<div class="container py-3">\n${finalHtml}</div>`;
            
            codeOutput.value = completeCode;
            outputCard.classList.remove('d-none');
            outputCard.scrollIntoView({ behavior: 'smooth' });
        });

        // Clear Workspace
        clearBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear your current design?')) {
                workspace.innerHTML = '';
                outputCard.classList.add('d-none');
            }
        });

        // Copy Code Button
        copyBtn.addEventListener('click', () => {
            codeOutput.select();
            navigator.clipboard.writeText(codeOutput.value);
            copyBtn.textContent = 'Copied!';
            setTimeout(() => {
                copyBtn.textContent = 'Copy Code';
            }, 2000);
        });
    </script>
</body>
</html>
