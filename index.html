<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Toyhou.se Layout Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; font-family: system-ui, -apple-system, sans-serif; }
        .sidebar { background-color: #fff; border-right: 1px solid #dee2e6; height: 100vh; position: fixed; top: 0; left: 0; width: 360px; overflow-y: auto; padding: 20px; z-index: 100; }
        .main-content { margin-left: 360px; padding: 30px; }
        .component-box { background: #f8f9fa; border: 1px solid #ced4da; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .draggable-btn { cursor: grab; width: 100%; text-align: left; margin-bottom: 10px; }
        .draggable-btn:active { cursor: grabbing; }
        .workspace { min-height: 500px; background: #fff; border: 3px dashed #0d6efd; border-radius: 12px; padding: 25px; transition: background 0.2s; }
        .workspace.drag-over { background-color: #e7f1ff; border-color: #0a58ca; }
        .workspace:empty::before { content: "Drag and drop components here to assemble your profile..."; color: #6c757d; display: block; text-align: center; line-height: 450px; font-weight: 500; }
        
        /* Workspace Interactivity */
        .workspace-item { position: relative; margin-bottom: 20px; padding: 10px; border: 1px dashed transparent; border-radius: 6px; }
        .workspace-item:hover { border-color: #dc3545; background-color: rgba(220, 53, 69, 0.02); }
        .delete-btn { display: none; position: absolute; top: -10px; right: -10px; z-index: 99; border-radius: 50%; width: 24px; height: 24px; padding: 0; line-height: 22px; text-align: center; }
        .workspace-item:hover .delete-btn { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 class="mb-1 fw-bold text-primary">Toyhou.se Studio</h3>
        <p class="text-muted small mb-4">Customize settings, then drag the blue buttons into your workspace.</p>
        
        <hr>

        <div class="component-box">
            <h6 class="fw-bold">1. Header & Text</h6>
            <div class="mb-2">
                <input type="text" id="text-content" class="form-control form-control-sm" value="Character Name / Title">
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6">
                    <label class="small text-muted">Text Color</label>
                    <input type="color" id="text-color" class="form-control form-control-sm" value="#0d6efd">
                </div>
                <div class="col-6">
                    <label class="small text-muted">Glow Color</label>
                    <input type="color" id="text-glow-color" class="form-control form-control-sm" value="#66b2ff">
                </div>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="text-glow-toggle">
                <label class="form-check-label small" for="text-glow-toggle">Enable Text Glow</label>
            </div>
            <button class="btn btn-sm btn-outline-primary draggable-btn" draggable="true" data-type="header">Drag Heading</button>
            <button class="btn btn-sm btn-outline-secondary draggable-btn" draggable="true" data-type="paragraph">Drag Paragraph</button>
        </div>

        <div class="component-box">
            <h6 class="fw-bold">2. Media & Links</h6>
            <div class="mb-2">
                <input type="text" id="media-img" class="form-control form-control-sm" value="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400" placeholder="Image URL">
            </div>
            <div class="mb-2">
                <input type="text" id="media-link" class="form-control form-control-sm" value="https://toyhou.se" placeholder="Click Link URL">
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6">
                    <label class="small text-muted">Box Glow</label>
                    <input type="color" id="box-glow-color" class="form-control form-control-sm" value="#0d6efd">
                </div>
                <div class="col-6">
                    <label class="small text-muted">Radius (px)</label>
                    <input type="number" id="img-radius" class="form-control form-control-sm" value="8">
                </div>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="box-glow-toggle">
                <label class="form-check-label small" for="box-glow-toggle">Enable Neon Image Glow</label>
            </div>
            <button class="btn btn-sm btn-outline-primary draggable-btn" draggable="true" data-type="image-link">Drag Linked Image</button>
        </div>

        <div class="component-box">
            <h6 class="fw-bold">3. Stat Table Creator</h6>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="text" id="table-k1" class="form-control form-control-sm" value="Species"></div>
                <div class="col-6"><input type="text" id="table-v1" class="form-control form-control-sm" value="Tiefling"></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="text" id="table-k2" class="form-control form-control-sm" value="Occuption"></div>
                <div class="col-6"><input type="text" id="table-v2" class="form-control form-control-sm" value="Mage"></div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="text" id="table-k3" class="form-control form-control-sm" value="Alignment"></div>
                <div class="col-6"><input type="text" id="table-v3" class="form-control form-control-sm" value="Chaotic Good"></div>
            </div>
            <button class="btn btn-sm btn-outline-primary draggable-btn" draggable="true" data-type="table">Drag Custom Table</button>
        </div>

        <div class="component-box">
            <h6 class="fw-bold">4. Layout Elements</h6>
            <button class="btn btn-sm btn-outline-dark draggable-btn" draggable="true" data-type="accordion">Drag Accordion (Tab alternative)</button>
            <button class="btn btn-sm btn-outline-dark draggable-btn" draggable="true" data-type="dropdown">Drag Toyhou.se Dropdown Menu</button>
            <button class="btn btn-sm btn-outline-dark draggable-btn" draggable="true" data-type="two-col">Drag 2-Column Responsive Row</button>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">Live Workspace Canvas</h2>
            <div>
                <button id="clear-btn" class="btn btn-outline-danger">Reset Canvas</button>
            </div>
        </div>

        <div id="workspace" class="workspace mb-4"></div>

        <div class="text-center mb-5">
            <button id="generate-btn" class="btn btn-success btn-lg px-5 shadow">Compile & Generate Code</button>
        </div>

        <div class="card d-none shadow-sm mb-5" id="output-card">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <span class="fw-bold">Generated HTML (Paste directly into Toyhou.se Code Editor)</span>
                <button id="copy-btn" class="btn btn-sm btn-primary">Copy to Clipboard</button>
            </div>
            <div class="card-body p-0">
                <textarea id="code-output" class="form-control font-monospace border-0 p-3" rows="12" style="resize: vertical; background-color: #2b2b2b; color: #f8f8f2;" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        const workspace = document.getElementById('workspace');
        const generateBtn = document.getElementById('generate-btn');
        const clearBtn = document.getElementById('clear-btn');
        const outputCard = document.getElementById('output-card');
        const codeOutput = document.getElementById('code-output');
        const copyBtn = document.getElementById('copy-btn');

        let activeDragType = null;

        // Initialize Drag and Drop Listeners safely
        document.querySelectorAll('.draggable-btn').forEach(btn => {
            btn.addEventListener('dragstart', (e) => {
                activeDragType = e.target.getAttribute('data-type');
            });
        });

        workspace.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        workspace.addEventListener('dragenter', () => {
            workspace.classList.add('drag-over');
        });

        workspace.addEventListener('dragleave', () => {
            workspace.classList.remove('drag-over');
        });

        workspace.addEventListener('drop', (e) => {
            e.preventDefault();
            workspace.classList.remove('drag-over');
            
            if (activeDragType) {
                const htmlContent = createComponentHTML(activeDragType);
                if (htmlContent) {
                    workspace.insertAdjacentHTML('beforeend', htmlContent);
                }
            }
        });

        // Dynamic Component String Builder
        function createComponentHTML(type) {
            // Configuration states
            const textVal = document.getElementById('text-content').value;
            const textColor = document.getElementById('text-color').value;
            const textGlowColor = document.getElementById('text-glow-color').value;
            const useTextGlow = document.getElementById('text-glow-toggle').checked;
            
            const imgUrl = document.getElementById('media-img').value;
            const linkUrl = document.getElementById('media-link').value;
            const boxGlowColor = document.getElementById('box-glow-color').value;
            const useBoxGlow = document.getElementById('box-glow-toggle').checked;
            const imgRadius = document.getElementById('img-radius').value;

            // Neon CSS properties computed safely without framework code lines
            const textGlowStyle = useTextGlow ? `text-shadow: 0 0 10px ${textGlowColor}, 0 0 20px ${textGlowColor};` : '';
            const boxGlowStyle = useBoxGlow ? `box-shadow: 0 0 15px ${boxGlowColor};` : '';

            // Unique IDs generation for functional Bootstrap elements like Accordions/Dropdowns
            const uniqueId = 'th-' + Math.floor(Math.random() * 100000);

            const baseWrapperOpen = `<div class="workspace-item"><button class="btn btn-danger btn-sm delete-btn" onclick="this.parentElement.remove()">×</button>`;
            const baseWrapperClose = `</div>`;

            switch(type) {
                case 'header':
                    return `${baseWrapperOpen}<h1 class="display-5 my-3" style="color: ${textColor}; ${textGlowStyle}">${textVal}</h1>${baseWrapperClose}`;
                
                case 'paragraph':
                    return `${baseWrapperOpen}<p class="my-3 text-muted" style="line-height: 1.6;">Add detailed backstory paragraphs here. Toyhou.se handles standard HTML line-breaks nicely inside clean elements.</p>${baseWrapperClose}`;
                
                case 'image-link':
                    return `${baseWrapperOpen}
                        <div class="my-3 text-center">
                            <a href="${linkUrl}" target="_blank">
                                <img src="${imgUrl}" class="img-fluid" style="border-radius: ${imgRadius}px; max-height: 350px; ${boxGlowStyle}" alt="Character Asset">
                            </a>
                        </div>
                    ${baseWrapperClose}`;

                case 'table':
                    const k1 = document.getElementById('table-k1').value; const v1 = document.getElementById('table-v1').value;
                    const k2 = document.getElementById('table-k2').value; const v2 = document.getElementById('table-v2').value;
                    const k3 = document.getElementById('table-k3').value; const v3 = document.getElementById('table-v3').value;
                    return `${baseWrapperOpen}
                        <table class="table table-sm table-borderless my-3">
                            <tbody>
                                <tr style="border-bottom: 1px solid rgba(0,0,0,0.05);">
                                    <td class="fw-bold py-2" style="width: 40%; color: ${textColor};">${k1}</td>
                                    <td class="py-2 text-muted">${v1}</td>
                                </tr>
                                <tr style="border-bottom: 1px solid rgba(0,0,0,0.05);">
                                    <td class="fw-bold py-2" style="color: ${textColor};">${k2}</td>
                                    <td class="py-2 text-muted">${v2}</td>
                                </tr>
                                <tr>
                                    <td class="fw-bold py-2" style="color: ${textColor};">${k3}</td>
                                    <td class="py-2 text-muted">${v3}</td>
                                </tr>
                            </tbody>
                        </table>
                    ${baseWrapperClose}`;

                case 'accordion':
                    return `${baseWrapperOpen}
                        <div class="accordion my-3" id="accordion-${uniqueId}">
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne-${uniqueId}">
                                        Section 1: Personality
                                    </button>
                                </h2>
                                <div id="collapseOne-${uniqueId}" class="accordion-collapse collapse show" data-bs-parent="#accordion-${uniqueId}">
                                    <div class="accordion-body text-muted">Insert specific behavioral attributes and descriptive personality breakdowns here.</div>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo-${uniqueId}">
                                        Section 2: Trivia & Notes
                                    </button>
                                </h2>
                                <div id="collapseTwo-${uniqueId}" class="accordion-collapse collapse" data-bs-parent="#accordion-${uniqueId}">
                                    <div class="accordion-body text-muted">List trivia facts, design preferences, likes, or dislikes cleanly inside this drop panel.</div>
                                </div>
                            </div>
                        </div>
                    ${baseWrapperClose}`;

                case 'dropdown':
                    return `${baseWrapperOpen}
                        <div class="dropdown my-3">
                            <button class="btn btn-secondary dropdown-toggle" type="button" id="drop-${uniqueId}" data-bs-toggle="dropdown" aria-expanded="false">
                                Quick Links Navigation
                            </button>
                            <ul class="dropdown-menu" aria-labelledby="drop-${uniqueId}">
                                <li><a class="dropdown-menu-item p-2 d-block text-dark text-decoration-none" href="#">Sub-Gallery</a></li>
                                <li><a class="dropdown-menu-item p-2 d-block text-dark text-decoration-none" href="#">Literature Hub</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-menu-item p-2 d-block text-danger text-decoration-none" href="#">Design Credits</a></li>
                            </ul>
                        </div>
                    ${baseWrapperClose}`;

                case 'two-col':
                    return `${baseWrapperOpen}
                        <div class="row my-2">
                            <div class="col-md-6 my-2">
                                <div class="p-3 border rounded-3 bg-light">Left Column Container Asset</div>
                            </div>
                            <div class="col-md-6 my-2">
                                <div class="p-3 border rounded-3 bg-light">Right Column Container Asset</div>
                            </div>
                        </div>
                    ${baseWrapperClose}`;
                
                default: 
                    return '';
            }
        }

        // Toyhou.se Compiler Engine
        generateBtn.addEventListener('click', () => {
            const clone = workspace.cloneNode(true);
            
            // Remove application UI builders instantly
            clone.querySelectorAll('.delete-btn').forEach(btn => btn.remove());

            const structuralElements = clone.querySelectorAll('.workspace-item');
            let cleanlyCompiledHTML = '';

            structuralElements.forEach(item => {
                item.removeAttribute('class'); // clear internal workspace helpers
                cleanlyCompiledHTML += item.innerHTML.trim() + '\n';
            });

            if (cleanlyCompiledHTML.trim() === '') {
                alert('Add components to the workspace first!');
                return;
            }

            // Wrap compiled output in a clean layout profile container wrapper (No Gap)
            const targetedOutput = `<div class="container-fluid p-2">\n${cleanlyCompiledHTML}</div>`;
            
            codeOutput.value = targetedOutput;
            outputCard.classList.remove('d-none');
            outputCard.scrollIntoView({ behavior: 'smooth' });
        });

        // Clear State
        clearBtn.addEventListener('click', () => {
            if(confirm('Wipe canvas workspace layout clean?')) {
                workspace.innerHTML = '';
                outputCard.classList.add('d-none');
            }
        });

        // Copy Engine
        copyBtn.addEventListener('click', () => {
            codeOutput.select();
            navigator.clipboard.writeText(codeOutput.value);
            copyBtn.textContent = 'Copied Code!';
            copyBtn.className = 'btn btn-sm btn-success';
            setTimeout(() => {
                copyBtn.textContent = 'Copy to Clipboard';
                copyBtn.className = 'btn btn-sm btn-primary';
            }, 2000);
        });
    </script>
</body>
</html>
